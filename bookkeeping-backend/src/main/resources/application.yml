server:
  port: 8080

spring:
  application:
    name: bookkeeping-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bookkeeping_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secretpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast256BitsLong!BookkeepingApp2026}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.samudera.bookkeeping: debug

# File upload directory (relative to project root, or absolute)
app:
  upload-dir: ${UPLOAD_DIR:uploads}
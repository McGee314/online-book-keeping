# ============================================================
# Bookkeeping System — Docker Compose Orchestration (HTTPS)
# Services: db, backend, frontend (Nginx + SSL), certbot
# ============================================================

version: "3.8"

services:

  # ==========================================================
  # Database — MySQL 8.0
  # ==========================================================
  db:
    image: mysql:8.0
    container_name: bookkeeping-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: bookkeeping_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecretpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - bookkeeping-net

  # ==========================================================
  # Backend — Spring Boot (port 8080)
  # ==========================================================
  backend:
    build:
      context: ./bookkeeping-backend
      dockerfile: Dockerfile
    container_name: bookkeeping-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/bookkeeping_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: secretpassword
      JWT_SECRET: YourSuperSecretKeyThatIsAtLeast256BitsLong!BookkeepingApp2026
      JWT_EXPIRATION: "86400000"
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookkeeping-net

  # ==========================================================
  # Frontend — Nginx serving Vue SPA (HTTP 80 → HTTPS 443)
  # ==========================================================
  frontend:
    build:
      context: ./bookkeeping-frontend
      dockerfile: Dockerfile
    container_name: bookkeeping-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt certificates & webroot (shared with certbot)
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - bookkeeping-net

  # ==========================================================
  # Certbot — Let's Encrypt SSL certificate renewal
  # ==========================================================
  certbot:
    image: certbot/certbot
    container_name: bookkeeping-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  bookkeeping-net:
    driver: bridge
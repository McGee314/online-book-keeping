<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Online Bookkeeping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f0f9ff;
            --bg-card: rgba(255,255,255,0.95);
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --accent-glow: rgba(14,165,233,0.25);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #dbeafe;
            --input-bg: #ffffff;
            --danger: #f87171;
            --success: #4ade80;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #fef9c3, #dcfce7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }
        .bg-orb--1 {
            width: 500px;
            height: 500px;
            background: #38bdf8;
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }
        .bg-orb--2 {
            width: 400px;
            height: 400px;
            background: #818cf8;
            bottom: -120px;
            right: -80px;
            animation-delay: -7s;
        }
        .bg-orb--3 {
            width: 350px;
            height: 350px;
            background: #38bdf8;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
            opacity: 0.08;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -15px) scale(1.05); }
        }

        /* Grid pattern overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: min(420px, 100%);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 36px 36px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 4px 6px rgba(0, 0, 0, 0.2),
                0 10px 40px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(56, 189, 248, 0.05) inset;
        }

        /* Brand / Logo area */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(56, 189, 248, 0.08));
            border: 1px solid rgba(56, 189, 248, 0.25);
            margin-bottom: 16px;
            font-size: 26px;
        }
        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .brand p {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.01em;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.05rem;
            pointer-events: none;
            transition: color var(--transition);
        }
        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all var(--transition);
        }
        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.45);
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: #ffffff;
        }
        .form-group input:focus ~ .input-icon,
        .form-group input:focus + .input-icon {
            color: var(--accent);
        }
        /* Since input-icon is before input, use sibling selector */
        .input-wrapper:focus-within .input-icon {
            color: var(--accent);
        }

        /* Options row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .remember-me input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 17px;
            height: 17px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            background: var(--input-bg);
            cursor: pointer;
            position: relative;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .remember-me input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .remember-me input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4.5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid #020617;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .forgot-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition);
        }
        .forgot-link:hover {
            color: var(--accent-hover);
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #7dd3fc, #38bdf8);
            box-shadow: 0 6px 24px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-login:hover::before {
            left: 100%;
        }
        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social buttons */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-social:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.08);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* Sign-up prompt */
        .signup-prompt {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .signup-prompt a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: color var(--transition);
        }
        .signup-prompt a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Toast notification (hidden by default) */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.35s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .toast--success { background: #065f46; border: 1px solid #34d399; color: #d1fae5; }
        .toast--error   { background: #7f1d1d; border: 1px solid #f87171; color: #fee2e2; }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 22px 28px;
                border-radius: 16px;
            }
            .brand h1 { font-size: 1.35rem; }
            .social-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Background animations -->
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="grid-overlay"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Login card -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon">📒</div>
                <h1>Welcome Back</h1>
                <p>Log in to your bookkeeping account</p>
            </div>

            <!-- Form -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            id="username"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a class="forgot-link" href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <!-- Divider -->
            <div class="divider">or continue with</div>

            <!-- Social buttons (decorative) -->
            <div class="social-buttons">
                <button type="button" class="btn-social">
                    <span>🔵</span> Google
                </button>
                <button type="button" class="btn-social">
                    <span>🐙</span> GitHub
                </button>
            </div>

            <!-- Sign-up prompt -->
            <p class="signup-prompt">
                Don't have an account?
                <a href="#">Create free account</a>
            </p>

        </div>
    </div>

    <!-- Simple demo script for toast / form feedback -->
    <script>
        const form = document.getElementById('loginForm');
        const toast = document.getElementById('toast');

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast toast--' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showToast('Please fill in all fields.', 'error');
                return;

    </script>

</body>
</html>
